# Supabase Free 專案 7 天無活動會被自動暫停。
# 每 3 天打一次 REST endpoint 保持活躍(季間空窗期防護)。
name: Supabase Keep-alive

on:
  schedule:
    - cron: "0 0 */3 * *" # 每 3 天 UTC 00:00
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST endpoint
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/seasons?select=id&limit=1" \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}")
          echo "HTTP $status"
          # 200(有資料)或 401/403(RLS 拒絕匿名)都代表專案活著
          if [ "$status" -ge 500 ]; then
            echo "Supabase 無回應" && exit 1
          fi
